name: Daily Grab Guangdong + Fujian udpxy IP

on:
  schedule:
    - cron: '10 0 * * *'   # UTC 00:10，北京时间 08:10
  workflow_dispatch:

jobs:
  grab:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run grab script
        run: python grab_gd_fj_ip.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git pull origin main --rebase || true
          git add ip.txt || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily Guangdong+Fujian udpxy IP update $(date '+%Y-%m-%d %H:%M UTC')"
          fi
          git push origin HEAD:main || git push origin HEAD:main --force-with-lease
