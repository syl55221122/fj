name: Daily Update Guangxi IPTV Sources

on:
  schedule:
    - cron: '30 0 * * *'           # 每天 UTC 00:30 运行（北京时间约 08:30）
  workflow_dispatch:               # 支持手动触发测试

jobs:
  scan-and-generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install required packages
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run the udpxy speed test script
        run: python guangxi_udpxy_test.py
        # 如果你的脚本文件名不是 guangxi_udpxy_test.py，请改成实际文件名，例如 python main.py

      - name: Upload generated txt as artifact
        uses: actions/upload-artifact@v4
        with:
          name: guangxi-available-sources
          path: ai.txt
          if-no-files-found: warn
          
      - name: Commit and push results
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # 先拉取远程，避免冲突
          git pull origin main --rebase || true
          
          # 添加文件（容错，不存在也不会报错）
          git add ai.txt || true
          
          # 只在有变更时 commit
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily national IPTV sources update $(date '+%Y-%m-%d %H:%M UTC')"
          fi
          
          # push（带 fallback）
          git push origin HEAD:main || git push origin HEAD:main --force-with-lease     
      # 可选：自动把结果提交回仓库（需要先设置权限）
      # 去仓库 Settings → Actions → General → Workflow permissions → 勾选 "Read and write permissions"
      # 然后去掉下面 4 行前面的 # 注释
      # - name: Commit and push updated txt (optional)
      #   run: |
      #     git config --global user.name "GitHub Actions Bot"
      #     git config --global user.email "actions@github.com"
      #     git add 广西_可用直播源.txt
